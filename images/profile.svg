<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="title desc">
  <title id="title">Yuying Zhang monogram</title>
  <desc id="desc">A simple green monogram with the initials YZ.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#50786c"/>
      <stop offset="1" stop-color="#173f35"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="28" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="125" fill="none" stroke="#fff" stroke-opacity=".24" stroke-width="2"/>
  <circle cx="200" cy="200" r="91" fill="none" stroke="#fff" stroke-opacity=".18" stroke-width="2"/>
  <text x="200" y="227" fill="#fff" font-family="Georgia,serif" font-size="94" text-anchor="middle" letter-spacing="-8">YZ</text>
</svg>
